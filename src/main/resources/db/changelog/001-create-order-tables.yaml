databaseChangeLog:
  - changeSet:
      id: 001-create-order-tables
      author: demo
      changes:
        - createTable:
            tableName: customer_order
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_reference_number
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: customer_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: subtotal
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: vat_amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: total
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
        - createTable:
            tableName: order_line_item
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: item
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: line_total
                  type: decimal(19,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: order_line_item
            baseColumnNames: order_id
            referencedTableName: customer_order
            referencedColumnNames: id
            constraintName: fk_order_line_item_order

